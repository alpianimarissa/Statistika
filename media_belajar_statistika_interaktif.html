    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChiptune(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.16); // G5
                osc.frequency.setValueAtTime(1046.50, now + 0.24); // C6
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                osc.start(now);
                osc.stop(now + 0.45);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(90, now + 0.25);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'levelUp') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(450, now + 0.2);
                osc.frequency.setValueAtTime(900, now + 0.3);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

                container.innerHTML = `
                    <div class="max-w-2xl mx-auto">
                        <span class="text-xs font-tech text-sky-400 uppercase tracking-widest bg-sky-950/50 px-3 py-1 rounded-full border border-sky-500/20">${slide.section}</span>
                        <h2 class="text-2xl font-bold font-tech text-slate-100 mt-3 mb-6">${slide.title}</h2>
                        <p class="text-slate-300 text-sm sm:text-base leading-relaxed mb-6 bg-slate-950/40 p-5 rounded-2xl border border-slate-800">${slide.question}</p>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="quizOptionsGrid">
                            ${slide.options.map(opt => `
                                <button onclick="checkQuizAnswer('${opt}', this)" class="w-full text-left p-4 bg-slate-800/50 hover:bg-slate-800 border border-slate-700/80 rounded-xl font-semibold text-slate-200 transition-all active:scale-98">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                // Execute standard html template generator function
                container.innerHTML = `
                    <div class="max-w-3xl mx-auto">
                        <span class="text-xs font-tech text-sky-400 uppercase tracking-widest bg-sky-950/50 px-3 py-1 rounded-full border border-sky-500/20">${slide.section}</span>
                        <h2 class="text-2xl font-bold font-tech text-slate-100 mt-3 mb-6">${slide.title}</h2>
                        ${slide.render()}
                    </div>
                `;
            }

            // Trigger post-rendering steps for specific simulation slides
            if (gameState.currentSlide === 5) {
                // Setup Warm-up 3 formula
                const expr = "Pecahan Rata: \\frac{10 + 20 + 15}{3} = \\dots?";
                katex.render(expr, document.getElementById('warmUpMathEq'), { throwOnError: false });
            }
            else if (gameState.currentSlide === 14) {
                // Render pizza diagram description
                katex.render("\\text{Total Porsi} = 360^\\circ \\quad \\text{atau} \\quad 100\\%", document.getElementById('katexCircle'), { throwOnError: false });
            }
            else if (gameState.currentSlide === 16) {
                updateMeanSandbox(0, gameState.sandboxMeanData[0]);
            }
            else if (gameState.currentSlide === 17) {
                renderMedianSortingWidget();
            }
            else if (gameState.currentSlide === 19) {
                // Formulas Cheat-sheet
                katex.render("\\text{Mean} = \\frac{\\sum \\text{Nilai Data}}{\\text{Banyak Data}}", document.getElementById('katexFormulaMean'), { throwOnError: false });
                katex.render("\\text{Median} = X_{\\frac{n+1}{2}}", document.getElementById('katexFormulaMedian'), { throwOnError: false });
            }
            else if (gameState.currentSlide === 20) {
                // Example 1
                katex.render("\\sum X = 10 + 20 + 15 + 25 + 30 = 100", document.getElementById('katexEx1Step1'), { throwOnError: false });
                katex.render("\\text{Mean} = \\frac{100}{5} = 20", document.getElementById('katexEx1Step2'), { throwOnError: false });
            }
            else if (gameState.currentSlide === 22) {
                // Example 3
                katex.render("\\text{Median} = \\frac{4 + 5}{2} = 4.5", document.getElementById('katexEx3Step'), { throwOnError: false });
            }
            else if (gameState.currentSlide === 34) {
                // Set certified player name dynamically
                const nameEl = document.getElementById('certPlayerName');
                if(nameEl) nameEl.innerText = gameState.playerName.toUpperCase();
            }
        }

        function nextSlide() {
            if (gameState.currentSlide < gameState.totalSlides - 1) {
                playChiptune('click');
                gameState.currentSlide++;
                renderCurrentSlide();
            }
        }

        function prevSlide() {
            if (gameState.currentSlide > 0) {
                playChiptune('click');
                gameState.currentSlide--;
                renderCurrentSlide();
            }
        }

        window.onload = function() {
            renderCurrentSlide();
        };
    </script>
</body>
</html>
